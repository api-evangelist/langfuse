naftiko: 1.0.0-alpha2
info:
  label: langfuse — Organizations
  description: 'langfuse — Organizations. 8 operations. Lead operation: Organizations. Self-contained Naftiko capability covering
    one Langfuse business surface.'
  tags:
  - Langfuse
  - Organizations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGFUSE_API_KEY: LANGFUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: langfuse-organizations
    baseUri: ''
    description: langfuse — Organizations business capability. Self-contained, no shared references.
    resources:
    - name: api-public-organizations-apiKeys
      path: /api/public/organizations/apiKeys
      operations:
      - name: organizationsgetorganizationapikeys
        method: GET
        description: Get all API keys for the organization associated with the API key (requires organization-scoped API key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-public-organizations-memberships
      path: /api/public/organizations/memberships
      operations:
      - name: organizationsgetorganizationmemberships
        method: GET
        description: Get all memberships for the organization associated with the API key (requires organization-scoped API
          key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: organizationsupdateorganizationmembership
        method: PUT
        description: Create or update a membership for the organization associated with the API key (requires organization-scoped
          API key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: organizationsdeleteorganizationmembership
        method: DELETE
        description: Delete a membership from the organization associated with the API key (requires organization-scoped API
          key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-public-organizations-projects
      path: /api/public/organizations/projects
      operations:
      - name: organizationsgetorganizationprojects
        method: GET
        description: Get all projects for the organization associated with the API key (requires organization-scoped API key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-public-projects-projectId-memberships
      path: /api/public/projects/{projectId}/memberships
      operations:
      - name: organizationsgetprojectmemberships
        method: GET
        description: Get all memberships for a specific project (requires organization-scoped API key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
      - name: organizationsupdateprojectmembership
        method: PUT
        description: Create or update a membership for a specific project (requires organization-scoped API key). The user
          must already be a member of the organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: organizationsdeleteprojectmembership
        method: DELETE
        description: Delete a membership from a specific project (requires organization-scoped API key). The user must be
          a member of the organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.LANGFUSE_USER}}'
      password: '{{env.LANGFUSE_PASS}}'
  exposes:
  - type: rest
    namespace: langfuse-organizations-rest
    port: 8080
    description: REST adapter for langfuse — Organizations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/public/organizations/apikeys
      name: api-public-organizations-apikeys
      description: REST surface for api-public-organizations-apiKeys.
      operations:
      - method: GET
        name: organizationsgetorganizationapikeys
        description: Get all API keys for the organization associated with the API key (requires organization-scoped API key)
        call: langfuse-organizations.organizationsgetorganizationapikeys
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/public/organizations/memberships
      name: api-public-organizations-memberships
      description: REST surface for api-public-organizations-memberships.
      operations:
      - method: GET
        name: organizationsgetorganizationmemberships
        description: Get all memberships for the organization associated with the API key (requires organization-scoped API
          key)
        call: langfuse-organizations.organizationsgetorganizationmemberships
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: organizationsupdateorganizationmembership
        description: Create or update a membership for the organization associated with the API key (requires organization-scoped
          API key)
        call: langfuse-organizations.organizationsupdateorganizationmembership
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: organizationsdeleteorganizationmembership
        description: Delete a membership from the organization associated with the API key (requires organization-scoped API
          key)
        call: langfuse-organizations.organizationsdeleteorganizationmembership
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/public/organizations/projects
      name: api-public-organizations-projects
      description: REST surface for api-public-organizations-projects.
      operations:
      - method: GET
        name: organizationsgetorganizationprojects
        description: Get all projects for the organization associated with the API key (requires organization-scoped API key)
        call: langfuse-organizations.organizationsgetorganizationprojects
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/public/projects/{projectid}/memberships
      name: api-public-projects-projectid-memberships
      description: REST surface for api-public-projects-projectId-memberships.
      operations:
      - method: GET
        name: organizationsgetprojectmemberships
        description: Get all memberships for a specific project (requires organization-scoped API key)
        call: langfuse-organizations.organizationsgetprojectmemberships
        with:
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: organizationsupdateprojectmembership
        description: Create or update a membership for a specific project (requires organization-scoped API key). The user
          must already be a member of the organization.
        call: langfuse-organizations.organizationsupdateprojectmembership
        with:
          projectId: rest.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: organizationsdeleteprojectmembership
        description: Delete a membership from a specific project (requires organization-scoped API key). The user must be
          a member of the organization.
        call: langfuse-organizations.organizationsdeleteprojectmembership
        with:
          projectId: rest.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: langfuse-organizations-mcp
    port: 9090
    transport: http
    description: MCP adapter for langfuse — Organizations. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-api-keys-organization
      description: Get all API keys for the organization associated with the API key (requires organization-scoped API key)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langfuse-organizations.organizationsgetorganizationapikeys
      outputParameters:
      - type: object
        mapping: $.
    - name: get-all-memberships-organization-associated
