    - name: delete-membership-organization-associated-api
      description: Delete a membership from the organization associated with the API key (requires organization-scoped API
        key)
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: langfuse-organizations.organizationsdeleteorganizationmembership
      with:
        body: tools.body
      outputParameters:
      - type: object
