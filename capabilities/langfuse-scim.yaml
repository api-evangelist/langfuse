naftiko: 1.0.0-alpha2
info:
  label: langfuse — Scim
  description: 'langfuse — Scim. 7 operations. Lead operation: Scim. Self-contained Naftiko capability covering one Langfuse
    business surface.'
  tags:
  - Langfuse
  - Scim
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGFUSE_API_KEY: LANGFUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: langfuse-scim
    baseUri: ''
    description: langfuse — Scim business capability. Self-contained, no shared references.
    resources:
    - name: api-public-scim-ResourceTypes
      path: /api/public/scim/ResourceTypes
      operations:
      - name: scimgetresourcetypes
        method: GET
        description: Get SCIM Resource Types (requires organization-scoped API key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-public-scim-Schemas
      path: /api/public/scim/Schemas
      operations:
      - name: scimgetschemas
        method: GET
        description: Get SCIM Schemas (requires organization-scoped API key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-public-scim-ServiceProviderConfig
      path: /api/public/scim/ServiceProviderConfig
      operations:
      - name: scimgetserviceproviderconfig
        method: GET
        description: Get SCIM Service Provider Configuration (requires organization-scoped API key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-public-scim-Users
      path: /api/public/scim/Users
      operations:
      - name: scimlistusers
        method: GET
        description: List users in the organization (requires organization-scoped API key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Filter expression (e.g. userName eq "value")
        - name: startIndex
          in: query
          type: integer
          description: 1-based index of the first result to return (default 1)
        - name: count
          in: query
          type: integer
          description: Maximum number of results to return (default 100)
      - name: scimcreateuser
        method: POST
        description: Create a new user in the organization (requires organization-scoped API key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-public-scim-Users-userId
      path: /api/public/scim/Users/{userId}
      operations:
      - name: scimgetuser
        method: GET
        description: Get a specific user by ID (requires organization-scoped API key)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
      - name: scimdeleteuser
        method: DELETE
        description: Remove a user from the organization (requires organization-scoped API key). Note that this only removes
          the user from the organization but does not delete the user entity itself.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
    authentication:
      type: basic
      username: '{{env.LANGFUSE_USER}}'
      password: '{{env.LANGFUSE_PASS}}'
  exposes:
  - type: rest
    namespace: langfuse-scim-rest
    port: 8080
    description: REST adapter for langfuse — Scim. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/public/scim/resourcetypes
      name: api-public-scim-resourcetypes
      description: REST surface for api-public-scim-ResourceTypes.
      operations:
      - method: GET
        name: scimgetresourcetypes
        description: Get SCIM Resource Types (requires organization-scoped API key)
        call: langfuse-scim.scimgetresourcetypes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/public/scim/schemas
      name: api-public-scim-schemas
      description: REST surface for api-public-scim-Schemas.
      operations:
      - method: GET
        name: scimgetschemas
        description: Get SCIM Schemas (requires organization-scoped API key)
        call: langfuse-scim.scimgetschemas
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/public/scim/serviceproviderconfig
      name: api-public-scim-serviceproviderconfig
      description: REST surface for api-public-scim-ServiceProviderConfig.
      operations:
      - method: GET
        name: scimgetserviceproviderconfig
        description: Get SCIM Service Provider Configuration (requires organization-scoped API key)
        call: langfuse-scim.scimgetserviceproviderconfig
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/public/scim/users
      name: api-public-scim-users
      description: REST surface for api-public-scim-Users.
      operations:
      - method: GET
        name: scimlistusers
        description: List users in the organization (requires organization-scoped API key)
        call: langfuse-scim.scimlistusers
        with:
          filter: rest.filter
          startIndex: rest.startIndex
          count: rest.count
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: scimcreateuser
        description: Create a new user in the organization (requires organization-scoped API key)
        call: langfuse-scim.scimcreateuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/public/scim/users/{userid}
      name: api-public-scim-users-userid
      description: REST surface for api-public-scim-Users-userId.
      operations:
      - method: GET
        name: scimgetuser
        description: Get a specific user by ID (requires organization-scoped API key)
        call: langfuse-scim.scimgetuser
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: scimdeleteuser
        description: Remove a user from the organization (requires organization-scoped API key). Note that this only removes
          the user from the organization but does not delete the user entity itself.
        call: langfuse-scim.scimdeleteuser
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: langfuse-scim-mcp
    port: 9090
    transport: http
    description: MCP adapter for langfuse — Scim. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-scim-resource-types-requires
      description: Get SCIM Resource Types (requires organization-scoped API key)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langfuse-scim.scimgetresourcetypes
      outputParameters:
      - type: object
        mapping: $.
    - name: get-scim-schemas-requires-organization
      description: Get SCIM Schemas (requires organization-scoped API key)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langfuse-scim.scimgetschemas
      outputParameters:
      - type: object
        mapping: $.
    - name: get-scim-service-provider-configuration
      description: Get SCIM Service Provider Configuration (requires organization-scoped API key)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langfuse-scim.scimgetserviceproviderconfig
      outputParameters:
      - type: object
        mapping: $.
    - name: list-users-organization-requires-organization
      description: List users in the organization (requires organization-scoped API key)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langfuse-scim.scimlistusers
      with:
        filter: tools.filter
        startIndex: tools.startIndex
        count: tools.count
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-user-organization-requires
      description: Create a new user in the organization (requires organization-scoped API key)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: langfuse-scim.scimcreateuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-specific-user-id-requires
      description: Get a specific user by ID (requires organization-scoped API key)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langfuse-scim.scimgetuser
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-user-organization-requires-organization
      description: Remove a user from the organization (requires organization-scoped API key). Note that this only removes
        the user from the organization but does not delete the user entity itself.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: langfuse-scim.scimdeleteuser
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
