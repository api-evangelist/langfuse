naftiko: 1.0.0-alpha2
info:
  label: langfuse — Datasets
  description: 'langfuse — Datasets. 6 operations. Lead operation: Datasets. Self-contained Naftiko capability covering one
    Langfuse business surface.'
  tags:
  - Langfuse
  - Datasets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGFUSE_API_KEY: LANGFUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: langfuse-datasets
    baseUri: ''
    description: langfuse — Datasets business capability. Self-contained, no shared references.
    resources:
    - name: api-public-datasets-datasetName-runs
      path: /api/public/datasets/{datasetName}/runs
      operations:
      - name: datasetsgetruns
        method: GET
        description: Get dataset runs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: datasetName
          in: path
          type: string
          required: true
        - name: page
          in: query
          type: integer
          description: page number, starts at 1
        - name: limit
          in: query
          type: integer
          description: limit of items per page
    - name: api-public-datasets-datasetName-runs-runName
      path: /api/public/datasets/{datasetName}/runs/{runName}
      operations:
      - name: datasetsgetrun
        method: GET
        description: Get a dataset run and its items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: datasetName
          in: path
          type: string
          required: true
        - name: runName
          in: path
          type: string
          required: true
      - name: datasetsdeleterun
        method: DELETE
        description: Delete a dataset run and all its run items. This action is irreversible.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: datasetName
          in: path
          type: string
          required: true
        - name: runName
          in: path
          type: string
          required: true
    - name: api-public-v2-datasets
      path: /api/public/v2/datasets
      operations:
      - name: datasetslist
        method: GET
        description: Get all datasets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: page number, starts at 1
        - name: limit
          in: query
          type: integer
          description: limit of items per page
      - name: datasetscreate
        method: POST
        description: Create a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-public-v2-datasets-datasetName
      path: /api/public/v2/datasets/{datasetName}
      operations:
      - name: datasetsget
        method: GET
        description: Get a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: datasetName
          in: path
          type: string
          required: true
    authentication:
      type: basic
      username: '{{env.LANGFUSE_USER}}'
      password: '{{env.LANGFUSE_PASS}}'
  exposes:
  - type: rest
    namespace: langfuse-datasets-rest
    port: 8080
    description: REST adapter for langfuse — Datasets. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/public/datasets/{datasetname}/runs
      name: api-public-datasets-datasetname-runs
      description: REST surface for api-public-datasets-datasetName-runs.
      operations:
      - method: GET
        name: datasetsgetruns
        description: Get dataset runs
        call: langfuse-datasets.datasetsgetruns
        with:
          datasetName: rest.datasetName
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/public/datasets/{datasetname}/runs/{runname}
      name: api-public-datasets-datasetname-runs-runname
      description: REST surface for api-public-datasets-datasetName-runs-runName.
      operations:
      - method: GET
        name: datasetsgetrun
        description: Get a dataset run and its items
        call: langfuse-datasets.datasetsgetrun
        with:
          datasetName: rest.datasetName
          runName: rest.runName
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: datasetsdeleterun
        description: Delete a dataset run and all its run items. This action is irreversible.
        call: langfuse-datasets.datasetsdeleterun
        with:
          datasetName: rest.datasetName
          runName: rest.runName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/public/v2/datasets
      name: api-public-v2-datasets
      description: REST surface for api-public-v2-datasets.
      operations:
      - method: GET
        name: datasetslist
        description: Get all datasets
        call: langfuse-datasets.datasetslist
        with:
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: datasetscreate
        description: Create a dataset
        call: langfuse-datasets.datasetscreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/public/v2/datasets/{datasetname}
      name: api-public-v2-datasets-datasetname
      description: REST surface for api-public-v2-datasets-datasetName.
      operations:
      - method: GET
        name: datasetsget
        description: Get a dataset
        call: langfuse-datasets.datasetsget
        with:
          datasetName: rest.datasetName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: langfuse-datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for langfuse — Datasets. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-dataset-runs
      description: Get dataset runs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langfuse-datasets.datasetsgetruns
      with:
        datasetName: tools.datasetName
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset-run-and-its
      description: Get a dataset run and its items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langfuse-datasets.datasetsgetrun
      with:
        datasetName: tools.datasetName
        runName: tools.runName
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-dataset-run-and-all
      description: Delete a dataset run and all its run items. This action is irreversible.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: langfuse-datasets.datasetsdeleterun
      with:
        datasetName: tools.datasetName
        runName: tools.runName
      outputParameters:
      - type: object
        mapping: $.
    - name: get-all-datasets
      description: Get all datasets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langfuse-datasets.datasetslist
      with:
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: create-dataset
      description: Create a dataset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: langfuse-datasets.datasetscreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset
      description: Get a dataset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: langfuse-datasets.datasetsget
      with:
        datasetName: tools.datasetName
      outputParameters:
      - type: object
        mapping: $.
