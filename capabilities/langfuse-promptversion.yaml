naftiko: 1.0.0-alpha2
info:
  label: langfuse — PromptVersion
  description: 'langfuse — PromptVersion. 1 operations. Lead operation: PromptVersion. Self-contained Naftiko capability covering
    one Langfuse business surface.'
  tags:
  - Langfuse
  - PromptVersion
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LANGFUSE_API_KEY: LANGFUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: langfuse-promptversion
    baseUri: ''
    description: langfuse — PromptVersion business capability. Self-contained, no shared references.
    resources:
    - name: api-public-v2-prompts-name-versions-version
      path: /api/public/v2/prompts/{name}/versions/{version}
      operations:
      - name: promptversionupdate
        method: PATCH
        description: Update labels for a specific prompt version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: 'The name of the prompt. If the prompt is in a folder (e.g., "folder/subfolder/prompt-name"), '
          required: true
        - name: version
          in: path
          type: integer
          description: Version of the prompt to update
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.LANGFUSE_USER}}'
      password: '{{env.LANGFUSE_PASS}}'
  exposes:
  - type: rest
    namespace: langfuse-promptversion-rest
    port: 8080
    description: REST adapter for langfuse — PromptVersion. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/public/v2/prompts/{name}/versions/{version}
      name: api-public-v2-prompts-name-versions-version
      description: REST surface for api-public-v2-prompts-name-versions-version.
      operations:
      - method: PATCH
        name: promptversionupdate
        description: Update labels for a specific prompt version
        call: langfuse-promptversion.promptversionupdate
        with:
          name: rest.name
          version: rest.version
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: langfuse-promptversion-mcp
    port: 9090
    transport: http
    description: MCP adapter for langfuse — PromptVersion. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: update-labels-specific-prompt-version
      description: Update labels for a specific prompt version
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: langfuse-promptversion.promptversionupdate
      with:
        name: tools.name
        version: tools.version
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
