    name: subscription
    type: flat
    metric: account
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 2499
    userMultiplied: false
  - label: Units Included
    name: units_included
    type: usage
    metric: unit
    limit: 100000
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: All Pro Features
  - name: Audit Logs and SCIM API
  - name: Custom Rate Limits
  - name: Uptime SLA
  - name: Dedicated Support Engineer
