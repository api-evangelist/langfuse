specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Langfuse
providerId: langfuse
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- LLM
- Observability
- Open Source
- Evaluations
- Plans
description: Langfuse cloud pricing reconciled against the Langfuse pricing page. Langfuse
  is also available as fully open-source self-hosted with no platform fees; cloud tiers add
  managed hosting, retention, support, and compliance.
sources:
- https://langfuse.com/pricing
- https://langfuse.com/self-hosting
plans:
- id: langfuse-self-hosted
  name: Self-Hosted (Open Source)
  type: free
  description: Open-source MIT-licensed Langfuse you can run on your own infrastructure with
    no platform fees. All core observability features are included.
  entries:
  - label: Platform Fee
    name: platform_fee
    type: flat
    metric: license
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: All Core Tracing, Eval, Prompt, Dataset Features
  - name: Self-Hosted Deployment
  - name: Community Support
- id: langfuse-hobby
  name: Hobby (Cloud)
  type: free
  description: Free cloud tier for hobby projects and POCs. No credit card required.
  entries:
  - label: Units Included
    name: units_included
    type: usage
    metric: unit
    limit: 50000
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  - label: Data Retention
    name: data_retention
    type: flat
    metric: day
    limit: 30
    timeFrame: usage
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  - label: Users
    name: users
    type: flat
    metric: user
    limit: 2
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Community Support
- id: langfuse-core
  name: Core (Cloud)
  type: paid
  description: Entry paid cloud tier for production workloads with extended retention.
  entries:
  - label: Subscription
    name: subscription
    type: flat
    metric: account
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 29
    userMultiplied: false
  - label: Units Included
    name: units_included
    type: usage
    metric: unit
    limit: 100000
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  - label: Units Overage
    name: units_overage
    type: usage
    metric: unit
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 100000
    price: 8
    userMultiplied: false
  - label: Data Retention
    name: data_retention
    type: flat
    metric: day
    limit: 90
    timeFrame: usage
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Unlimited Users
  - name: In-App Support
  - name: Startup/Research/OSS Discounts
- id: langfuse-pro
  name: Pro (Cloud)
  type: paid
  description: Pro plan for scaling applications with full feature set and long-term retention.
  entries:
  - label: Subscription
    name: subscription
    type: flat
    metric: account
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 199
    userMultiplied: false
  - label: Units Included
    name: units_included
    type: usage
    metric: unit
    limit: 100000
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  - label: Units Overage
    name: units_overage
    type: usage
    metric: unit
